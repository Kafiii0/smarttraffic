<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Traffic Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loader { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 8px rgba(0,0,0,.12) !important; margin-top: 15px !important; margin-right: 15px !important;}
        .leaflet-control-zoom a { color: #334155 !important; }
        .pulse-pin { display:block; width:22px; height:22px; border-radius:50%; background:#2563eb; border:3px solid white; animation: pulse 2s infinite; }
        .pulse-pin.dest { background:#ef4444; animation: pulse-red 2s infinite; }
        @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(37,99,235,.7)} 70%{box-shadow:0 0 0 14px rgba(37,99,235,0)} 100%{box-shadow:0 0 0 0 rgba(37,99,235,0)} }
        @keyframes pulse-red { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)} 70%{box-shadow:0 0 0 14px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
        .resize-handle { width:6px; cursor:col-resize; background:transparent; transition:background .2s; position:absolute; right:0; top:0; bottom:0; z-index:30; }
        .resize-handle:hover, .resize-handle.active { background: #3b82f6; }
        .cctv-marker-wrap { width:34px; height:34px; border-radius:50%; background:#111827; border:3px solid #fff; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 18px rgba(15,23,42,.28); color:#22d3ee; position:relative; }
        .cctv-marker-wrap::after { content:""; position:absolute; inset:-7px; border-radius:50%; border:2px solid rgba(34,211,238,.35); animation:cctv-ping 1.8s ease-out infinite; }
        .cctv-marker-wrap svg { width:18px; height:18px; position:relative; z-index:1; }
        @keyframes cctv-ping { 0%{transform:scale(.72); opacity:.9} 80%,100%{transform:scale(1.35); opacity:0} }
        .cctv-popup .leaflet-popup-content-wrapper { border-radius:14px; overflow:hidden; box-shadow:0 16px 40px rgba(15,23,42,.22); }
        .cctv-popup .leaflet-popup-content { width:280px !important; margin:0; }
        .cctv-popup .leaflet-popup-tip { background:#0f172a; }
        .cctv-popup-card { background:#0f172a; color:#fff; }
        .cctv-popup-header { padding:12px 14px 10px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
        .cctv-popup-title { font-size:13px; font-weight:800; line-height:1.25; color:#f8fafc; }
        .cctv-live-badge { flex-shrink:0; display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:4px 8px; background:rgba(239,68,68,.16); color:#fecaca; font-size:10px; font-weight:800; letter-spacing:.02em; }
        .cctv-video-wrap { position:relative; background:#020617; }
        .cctv-video { display:block; width:100%; aspect-ratio:16/9; background:#020617; object-fit:cover; }
        .cctv-status { position:absolute; left:10px; right:10px; bottom:10px; border-radius:8px; padding:7px 9px; background:rgba(15,23,42,.86); color:#e2e8f0; font-size:10px; font-weight:700; line-height:1.3; pointer-events:none; }
        .cctv-status.ok { background:rgba(5,150,105,.88); color:#ecfdf5; }
        .cctv-status.warn { background:rgba(180,83,9,.88); color:#fffbeb; }
        .cctv-popup-footer { padding:8px 14px 12px; font-size:10px; font-weight:600; color:#94a3b8; }
    </style>
</head>
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col bg-slate-100 antialiased text-slate-800">

    <div class="flex flex-col md:flex-row w-full h-full overflow-hidden relative">

        <main class="w-full h-[45vh] md:h-full md:flex-1 relative z-10 order-1 md:order-2 shrink-0">
            <div id="map" class="w-full h-full" style="cursor:crosshair;"></div>
            <div class="absolute top-4 left-4 md:bottom-4 md:right-4 md:top-auto md:left-auto z-[1000] bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-full shadow border border-white/50 flex items-center gap-2 pointer-events-none">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-[10px] md:text-[11px] font-semibold text-slate-600">OSRM Terhubung</span>
            </div>
        </main>

        <aside id="sidebar" class="w-full h-[55vh] md:h-full md:w-[400px] bg-white shadow-[0_-8px_30px_rgba(0,0,0,0.12)] md:shadow-lg z-20 flex flex-col relative shrink-0 order-2 md:order-1 rounded-t-3xl md:rounded-none">
            
            <div id="resizeHandle" class="hidden md:block resize-handle"></div>

            <div class="p-4 md:p-5 bg-slate-900 text-white shrink-0 rounded-t-3xl md:rounded-none flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-600/20 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-base md:text-lg leading-tight">Smart Traffic</h1>
                        <p class="text-[9px] md:text-[10px] text-blue-300 uppercase tracking-[3px] font-semibold">Navigator</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-5 flex flex-col gap-5">
                
                <div class="flex items-start gap-2.5 p-3 bg-blue-50 rounded-lg border border-blue-100 text-[11px] md:text-xs text-blue-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 mt-0.5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" /></svg>
                    <span>Klik di peta untuk menentukan <b>Asal</b> lalu <b>Tujuan</b>.</span>
                </div>

                <form id="routeForm" class="space-y-4">
                    <div class="relative space-y-2.5">
                        <div class="absolute left-3.5 top-7 bottom-7 w-0.5 bg-slate-200 z-0"></div>
                        <div class="relative z-10 flex items-center gap-2.5">
                            <div class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center border-2 border-white shadow-sm shrink-0"><div class="w-2.5 h-2.5 bg-blue-600 rounded-full"></div></div>
                            <input type="text" id="asalText" readonly placeholder="Pilih titik asal di peta..." class="w-full bg-slate-50 hover:bg-slate-100 transition rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none cursor-pointer">
                            <button type="button" id="btnGps" class="shrink-0 p-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            </button>
                        </div>
                        <div class="relative z-10 flex items-center gap-2.5">
                            <div class="w-7 h-7 rounded-full bg-red-100 flex items-center justify-center border-2 border-white shadow-sm shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-red-600" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
                            </div>
                            <input type="text" id="tujuanText" readonly placeholder="Pilih titik tujuan di peta..." class="w-full bg-slate-50 hover:bg-slate-100 transition rounded-lg border border-slate-200 px-3 py-2.5 text-sm outline-none cursor-pointer">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Kendaraan</label>
                        <div class="grid grid-cols-2 gap-2.5">
                            <label class="cursor-pointer"><input type="radio" name="kendaraan" value="motor" class="peer sr-only" checked>
                                <div class="flex items-center gap-2 p-2.5 rounded-lg border border-slate-200 peer-checked:bg-slate-900 peer-checked:border-slate-900 peer-checked:text-white text-slate-500 transition-all text-sm font-semibold">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg> Motor
                                </div>
                            </label>
                            <label class="cursor-pointer"><input type="radio" name="kendaraan" value="mobil" class="peer sr-only">
                                <div class="flex items-center gap-2 p-2.5 rounded-lg border border-slate-200 peer-checked:bg-slate-900 peer-checked:border-slate-900 peer-checked:text-white text-slate-500 transition-all text-sm font-semibold">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg> Mobil
                                </div>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-600/25 transition flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        Kalkulasi ETA
                    </button>
                </form>

                <div id="errorSection" class="hidden p-3 bg-red-50 border border-red-100 rounded-lg text-red-600 text-sm font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                    <span id="errorMessage"></span>
                </div>

                <div id="resultSection" class="hidden border-t border-slate-100 pt-4 pb-4">
                    <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Ringkasan Perjalanan
                    </h3>
                    <div class="grid grid-cols-2 gap-2.5 mb-3">
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <div class="text-slate-400 text-[9px] font-bold uppercase tracking-widest mb-1">Total Waktu (ETA)</div>
                            <div class="text-2xl font-extrabold text-blue-600" id="resEta">--</div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <div class="text-slate-400 text-[9px] font-bold uppercase tracking-widest mb-1">Total Jarak</div>
                            <div class="text-xl font-bold text-slate-700 mt-0.5" id="resJarak">--</div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-100">
                        <div><div class="text-slate-400 text-[9px] font-bold uppercase tracking-widest">Status Lalin</div><div class="font-bold" id="resKepadatan">--</div></div>
                        <div class="w-px h-6 bg-slate-200"></div>
                        <div class="text-right"><div class="text-slate-400 text-[9px] font-bold uppercase tracking-widest">Kendaraan</div><div class="font-bold text-slate-700 capitalize" id="resKendaraan">--</div></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="bottomPanel" class="hidden absolute md:relative bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-[0_-10px_30px_rgba(0,0,0,0.15)] z-[100] md:z-30 rounded-t-2xl md:rounded-none">
        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mt-3 md:hidden"></div>
        <div class="max-w-screen-2xl mx-auto px-5 py-4">
            <div class="flex items-center justify-between mb-4">
                <h4 class="font-bold text-slate-800 text-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                    Alur Rute Perjalanan
                </h4>
                <button onclick="document.getElementById('bottomPanel').classList.add('hidden'); map.invalidateSize();" class="text-slate-400 hover:text-slate-600 transition p-2 md:p-1 bg-slate-100 md:bg-transparent rounded-full md:rounded-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="routeDetails" class="overflow-x-auto pb-3 flex gap-2"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const handle = document.getElementById('resizeHandle');
        let isResizing = false;
        
        handle.addEventListener('mousedown', () => { isResizing = true; handle.classList.add('active'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
        document.addEventListener('mousemove', (e) => { if(!isResizing || window.innerWidth < 768) return; let w = e.clientX; if(w < 280) w = 280; if(w > 600) w = 600; sidebar.style.width = w + 'px'; map.invalidateSize(); });
        document.addEventListener('mouseup', () => { if(isResizing){ isResizing = false; handle.classList.remove('active'); document.body.style.cursor=''; document.body.style.userSelect=''; map.invalidateSize(); }});
        window.addEventListener('resize', () => { if(window.innerWidth < 768) { sidebar.style.width = '100%'; } else { sidebar.style.width = '400px'; } map.invalidateSize(); });

        const map = L.map('map', { zoomControl: false }).setView([3.5900, 98.6780], 13);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        let originPoint = null, destPoint = null, originMarker = null, destMarker = null, currentPolylines = [];
        const cctvLayer = L.layerGroup().addTo(map);
        const activeHlsPlayers = new Map();
        const fallbackCctvSrc = '/static/mock_cctv.mp4';
        const iconOrigin = L.divIcon({ className:'', html:'<div class="pulse-pin"></div>', iconSize:[22,22], iconAnchor:[11,11] });
        const iconDest = L.divIcon({ className:'', html:'<div class="pulse-pin dest"></div>', iconSize:[22,22], iconAnchor:[11,11] });
        const iconCctv = L.divIcon({
            className: '',
            html: `<div class="cctv-marker-wrap"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M4 6h8a3 3 0 013 3v6a3 3 0 01-3 3H4a1 1 0 01-1-1V7a1 1 0 011-1z" /><path stroke-linecap="round" stroke-linejoin="round" d="M7 10h4" /></svg></div>`,
            iconSize: [34, 34], iconAnchor: [17, 17], popupAnchor: [0, -18]
        });

        async function getAddressFromCoords(lat, lng) {
            try { const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`); const d = await r.json(); const p=d.display_name.split(','); return p.length>2?p.slice(0,2).join(', '):d.display_name; } catch(e) { return `${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char]);
        }

        function buildCctvPopup(cctv) {
            return `<div class="cctv-popup-card"><div class="cctv-popup-header"><div class="cctv-popup-title">${escapeHtml(cctv.nama)}</div><div class="cctv-live-badge">LIVE</div></div><div class="cctv-video-wrap"><video id="cctv-video-${cctv.id}" class="cctv-video" muted autoplay playsinline controls preload="metadata"></video><div id="cctv-status-${cctv.id}" class="cctv-status">Menghubungkan ke stream ATCS Medan...</div></div><div class="cctv-popup-footer">Sumber: ATCS Dishub Kota Medan</div></div>`;
        }

        function setCctvStatus(videoId, message, type = 'warn') {
            const status = document.getElementById(videoId.replace('cctv-video-', 'cctv-status-'));
            if (status) { status.textContent = message; status.className = `cctv-status ${type}`; }
        }

        function destroyCctvPlayer(videoId) {
            const hls = activeHlsPlayers.get(videoId);
            if (hls) { hls.destroy(); activeHlsPlayers.delete(videoId); }
            const video = document.getElementById(videoId);
            if (video) { video.pause(); video.removeAttribute('src'); video.load(); }
        }

        function useCctvFallback(videoId) {
            const video = document.getElementById(videoId);
            if (!video || video.dataset.fallbackActive === 'true') return;
            const hls = activeHlsPlayers.get(videoId);
            if (hls) { hls.destroy(); activeHlsPlayers.delete(videoId); }
            video.dataset.fallbackActive = 'true';
            setCctvStatus(videoId, 'Stream ATCS sedang offline.', 'warn');
            video.src = fallbackCctvSrc; video.muted = true; video.load();
            const p = video.play(); if (p && p.catch) p.catch(()=>{});
        }

        function initializeCctvPlayer(videoId, streamUrl) {
            const video = document.getElementById(videoId);
            if (!video) return;
            destroyCctvPlayer(videoId);
            video.dataset.fallbackActive = 'false'; video.muted = true; video.autoplay = true; video.playsInline = true;
            setCctvStatus(videoId, 'Menghubungkan...', 'warn');

            if (window.Hls && Hls.isSupported()) {
                const hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                activeHlsPlayers.set(videoId, hls);
                hls.on(Hls.Events.ERROR, (e, data) => { if (data && (data.type === Hls.ErrorTypes.NETWORK_ERROR || data.fatal)) useCctvFallback(videoId); });
                hls.on(Hls.Events.MANIFEST_PARSED, () => { setCctvStatus(videoId, 'Stream ATCS tersambung.', 'ok'); const p = video.play(); if(p && p.catch) p.catch(()=>{}); });
                hls.loadSource(streamUrl); hls.attachMedia(video);
                return;
            }
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => { setCctvStatus(videoId, 'Stream ATCS tersambung.', 'ok'); const p = video.play(); if(p && p.catch) p.catch(()=>{}); }, { once: true });
                video.addEventListener('error', () => useCctvFallback(videoId), { once: true });
                return;
            }
            useCctvFallback(videoId);
        }

        async function loadCctvMarkers() {
            try {
                const response = await fetch('/api/cctv');
                if (!response.ok) return;
                const payload = await response.json();
                const cctvData = Array.isArray(payload) ? payload : payload.data;
                if (!Array.isArray(cctvData)) return;
                cctvLayer.clearLayers();
                cctvData.forEach((cctv) => {
                    if (!Number.isFinite(Number(cctv.lat)) || !Number.isFinite(Number(cctv.lng))) return;
                    const videoId = `cctv-video-${cctv.id}`;
                    const marker = L.marker([Number(cctv.lat), Number(cctv.lng)], { icon: iconCctv, title: cctv.nama, bubblingMouseEvents: false }).addTo(cctvLayer);
                    marker.bindPopup(buildCctvPopup(cctv), { className: 'cctv-popup', maxWidth: 300, closeButton: true });
                    marker.on('popupopen', () => initializeCctvPlayer(videoId, cctv.stream_url));
                    marker.on('popupclose', () => destroyCctvPlayer(videoId));
                });
            } catch (e) {}
        }

        let clickState = 'origin';
        map.on('click', async function(e) {
            const {lat, lng} = e.latlng;
            if (clickState === 'origin') {
                if(originMarker) map.removeLayer(originMarker);
                originPoint = {lat, lng};
                originMarker = L.marker([lat,lng], {icon:iconOrigin}).addTo(map);
                const inp = document.getElementById('asalText'); inp.value="Mencari alamat..."; inp.classList.add('animate-pulse');
                inp.value = await getAddressFromCoords(lat,lng); inp.classList.remove('animate-pulse');
                clickState='dest';
                document.getElementById('tujuanText').classList.add('ring-2','ring-blue-400');
                setTimeout(()=>document.getElementById('tujuanText').classList.remove('ring-2','ring-blue-400'),1500);
            } else {
                if(destMarker) map.removeLayer(destMarker);
                destPoint = {lat, lng};
                destMarker = L.marker([lat,lng], {icon:iconDest}).addTo(map);
                const inp = document.getElementById('tujuanText'); inp.value="Mencari alamat..."; inp.classList.add('animate-pulse');
                inp.value = await getAddressFromCoords(lat,lng); inp.classList.remove('animate-pulse');
                clickState='origin';
            }
        });

        document.getElementById('btnGps').addEventListener('click', () => {
            if (navigator.geolocation) {
                const btn = document.getElementById('btnGps');
                btn.classList.add('animate-pulse');
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    if(originMarker) map.removeLayer(originMarker);
                    originPoint = {lat, lng};
                    originMarker = L.marker([lat,lng], {icon:iconOrigin}).addTo(map);
                    map.setView([lat, lng], 15);
                    const inp = document.getElementById('asalText');
                    inp.value = "Mendeteksi lokasi...";
                    inp.value = await getAddressFromCoords(lat, lng);
                    btn.classList.remove('animate-pulse');
                    clickState = 'dest';
                    document.getElementById('tujuanText').classList.add('ring-2','ring-blue-400');
                    setTimeout(()=>document.getElementById('tujuanText').classList.remove('ring-2','ring-blue-400'),1500);
                }, () => { btn.classList.remove('animate-pulse'); });
            }
        });

        document.getElementById('routeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!originPoint||!destPoint){ showError("Lengkapi titik."); return; }
            const kendaraan = document.querySelector('input[name="kendaraan"]:checked').value;
            const btn = document.getElementById('submitBtn');
            const origHTML = btn.innerHTML;
            btn.innerHTML='<div class="loader"></div>'; btn.disabled=true; btn.classList.add('opacity-70');
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('bottomPanel').classList.add('hidden');
            document.getElementById('errorSection').classList.add('hidden');

            try {
                const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${originPoint.lng},${originPoint.lat};${destPoint.lng},${destPoint.lat}?steps=true&geometries=geojson&overview=full`;
                const osrmRes = await fetch(osrmUrl);
                const osrmData = await osrmRes.json();
                if(!osrmData.routes||!osrmData.routes.length) throw new Error("Rute tidak ditemukan.");

                const route = osrmData.routes[0];
                const steps = route.legs[0].steps;
                const validSteps = steps.filter(s => s.distance > 0);
                const backendSegments = validSteps.map(s => ({ name: s.name || "Jalan Lokal", distance: s.distance }));

                const backendRes = await fetch('/api/route', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ kendaraan, segments: backendSegments }) });
                const backendData = await backendRes.json();
                if(!backendRes.ok) throw new Error(backendData.error || 'Error backend');

                displayResults(backendData);
                drawColoredRoute(validSteps, backendData.detail_rute);
                
                if (window.innerWidth < 768) {
                    setTimeout(() => { document.getElementById('sidebar').scrollTo({ top: document.getElementById('sidebar').scrollHeight, behavior: 'smooth' }); }, 300);
                }

            } catch(err) { showError(err.message); }
            finally { btn.innerHTML=origHTML; btn.disabled=false; btn.classList.remove('opacity-70'); }
        });

        function displayResults(data) {
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('resEta').textContent = `${data.estimasi_waktu_total_menit} mnt`;
            document.getElementById('resJarak').textContent = `${data.total_jarak_km} km`;
            document.getElementById('resKendaraan').textContent = data.kendaraan;
            const kep = document.getElementById('resKepadatan');
            kep.textContent = data.status_kepadatan;
            kep.className = 'font-bold ' + (data.status_kepadatan==='Lancar'?'text-emerald-600':data.status_kepadatan==='Padat'?'text-amber-500':'text-rose-600');

            const panel = document.getElementById('bottomPanel');
            panel.classList.remove('hidden');
            const container = document.getElementById('routeDetails');
            container.innerHTML = '';

            const segments = data.detail_rute.filter(r => r.jarak_km >= 0.03);
            if(segments.length === 0) { map.invalidateSize(); return; }

            let html = '<div class="flex items-start" style="min-width:max-content;">';

            segments.forEach((r, i) => {
                let dotBg = r.kondisi==='lancar'?'bg-emerald-500':r.kondisi==='padat'?'bg-amber-400':'bg-rose-500';
                let dotRing = r.kondisi==='lancar'?'ring-emerald-200':r.kondisi==='padat'?'ring-amber-200':'ring-rose-200';
                let lineBg = r.kondisi==='lancar'?'bg-emerald-400':r.kondisi==='padat'?'bg-amber-400':'bg-rose-400';
                let badge = r.kondisi==='lancar'?'bg-emerald-100 text-emerald-700':r.kondisi==='padat'?'bg-amber-100 text-amber-700':'bg-rose-100 text-rose-700';

                html += `<div class="flex flex-col items-center shrink-0" style="width:40px;"><div class="w-4 h-4 rounded-full ${dotBg} ring-4 ${dotRing} z-10"></div><div class="mt-2 text-[10px] font-bold text-slate-500 text-center leading-tight w-20">${i === 0 ? 'Mulai' : 'Titik ' + (i+1)}</div></div>`;
                html += `<div class="flex flex-col items-center shrink-0" style="width:140px;"><div class="w-full h-1 ${lineBg} rounded-full mt-1.5"></div><div class="mt-2 bg-white border border-slate-100 rounded-lg shadow-sm p-2 w-full"><div class="font-bold text-[11px] text-slate-700 truncate" title="${r.jalan}">${r.jalan}</div><div class="flex items-center gap-1.5 mt-1 text-[10px] text-slate-400 font-medium"><span>${r.jarak_km} km</span><span>&middot;</span><span>${r.estimasi_menit} mnt</span></div><span class="inline-block mt-1 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase ${badge}">${r.kondisi}</span></div></div>`;
            });

            html += `<div class="flex flex-col items-center shrink-0" style="width:40px;"><div class="w-4 h-4 rounded-full bg-rose-500 ring-4 ring-rose-200 z-10"></div><div class="mt-2 text-[10px] font-bold text-slate-500 text-center leading-tight w-20">Tujuan</div></div></div>`;
            container.innerHTML = html;
            map.invalidateSize();
        }

        function drawColoredRoute(osrmSteps, backendDetails) {
            currentPolylines.forEach(l => map.removeLayer(l));
            currentPolylines = [];
            let allCoords = [];

            osrmSteps.forEach((step, i) => {
                if(!step.geometry || !step.geometry.coordinates) return;
                const coords = step.geometry.coordinates.map(c=>[c[1],c[0]]);
                allCoords = allCoords.concat(coords);

                const detail = backendDetails[i];
                const kondisi = detail ? detail.kondisi : 'lancar';
                let color = '#10b981';
                if(kondisi==='padat') color='#f59e0b';
                if(kondisi==='macet') color='#e11d48';

                currentPolylines.push(L.polyline(coords, {color:'#1e293b',weight:8,opacity:.25,lineJoin:'round',lineCap:'round'}).addTo(map));
                currentPolylines.push(L.polyline(coords, {color,weight:5,opacity:1,lineJoin:'round',lineCap:'round'}).addTo(map));
            });

            if(allCoords.length) map.fitBounds(L.polyline(allCoords).getBounds(), {paddingTopLeft:[50,50],paddingBottomRight:[50,50]});
        }

        function showError(msg) { document.getElementById('errorMessage').textContent=msg; document.getElementById('errorSection').classList.remove('hidden'); }

        loadCctvMarkers();
    </script>
</body>
</html>
